name: CI

on:
  push:
  pull_request:

jobs:
  # The default build now routes through libsoxr (reference-grade SRC), so every
  # platform installs the C library + pkg-config before building. Windows uses the
  # vcpkg that ships preinstalled on the GitHub runner, plus pkg-config from choco,
  # and puts the soxr DLL on PATH so the test binaries can load it at runtime.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libsoxr (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsoxr-dev pkg-config

      - name: Install libsoxr (macOS)
        if: runner.os == 'macOS'
        run: brew install libsoxr pkg-config

      - name: Install libsoxr (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install soxr:x64-windows
          choco install pkgconfiglite -y
          $root = $env:VCPKG_INSTALLATION_ROOT
          # pkg-config locates soxr.pc here; the DLL on PATH lets test binaries load it.
          "PKG_CONFIG_PATH=$root\installed\x64-windows\lib\pkgconfig" | Out-File $env:GITHUB_ENV -Append
          "$root\installed\x64-windows\bin" | Out-File $env:GITHUB_PATH -Append

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  # The pure-Rust rubato fallback must keep compiling and passing with no system deps.
  test-rubato-fallback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build (rubato fallback)
        run: cargo build --no-default-features --verbose

      - name: Test (rubato fallback)
        run: cargo test --no-default-features --verbose
